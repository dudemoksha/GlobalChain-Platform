name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          cd globalchain-frontend
          npm install

      - name: Build Web App
        run: |
          cd globalchain-frontend
          npm run build

      - name: Sync Capacitor
        run: |
          cd globalchain-frontend
          npx cap sync android

      - name: Build Android APK
        run: |
          cd globalchain-frontend/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: globalchain-app-debug
          path: globalchain-frontend/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Generate Direct Download Link
        run: |
          echo "Generating direct download link..."
          curl --upload-file globalchain-frontend/android/app/build/outputs/apk/debug/app-debug.apk https://transfer.sh/GlobalChain.apk > direct_link.txt
          echo "DIRECT DOWNLOAD LINK: $(cat direct_link.txt)"
          echo "DIRECT_LINK=$(cat direct_link.txt)" >> $GITHUB_ENV
